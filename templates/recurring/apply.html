{% extends "base.html" %}
{% block title %}固定費を反映 - 青色申告 帳簿ツール{% endblock %}
{% block content %}
<div class="card">
  <h1>固定費を反映</h1>
  <p class="help">登録済みの固定費を、指定した年月の取引として一括で作成します。既にその月に反映済みの項目はスキップされます。</p>
  <form method="post" action="{{ url_for('recurring.apply') }}">
    <label for="year">年</label>
    <select name="year" id="year">
      {% for y in range(2024, 2030) %}
      <option value="{{ y }}" {% if y == now.year %}selected{% endif %}>{{ y }}年</option>
      {% endfor %}
    </select>
    <label for="month">月</label>
    <select name="month" id="month">
      {% for m in range(1, 13) %}
      <option value="{{ m }}" {% if m == now.month %}selected{% endif %}>{{ m }}月</option>
      {% endfor %}
    </select>
    <p><button type="submit" class="btn">この月の固定費を反映する</button></p>
  </form>
  <p><a href="{{ url_for('recurring.index') }}">← 固定費一覧に戻る</a></p>
</div>
{% endblock %}
